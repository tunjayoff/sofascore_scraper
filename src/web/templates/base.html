<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}SofaScore Scraper{% endblock %}</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
        }
        // On page load or when changing themes, best to add inline in `head` to avoid FOUC
        if (localStorage.getItem('theme') === 'dark' || (!('theme' in localStorage) && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
            document.documentElement.classList.add('dark');
        } else {
            document.documentElement.classList.remove('dark');
        }
    </script>
    <link rel="stylesheet" href="/static/css/styles.css">
    <script defer src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js"></script>
</head>
<body class="bg-zinc-50 dark:bg-[#0a0a0a] text-zinc-900 dark:text-zinc-100 antialiased overflow-x-hidden">
    <div class="min-h-screen flex flex-col md:flex-row relative">
        <aside class="w-full md:w-72 shrink-0 border-b md:border-b-0 md:border-r border-zinc-200 dark:border-zinc-800/60 bg-white/70 dark:bg-zinc-900/50 backdrop-blur-xl p-6 flex flex-col z-10 sticky top-0 md:h-screen">
            <div class="flex-1">
                <div class="flex items-center gap-3 mb-8">
                    <div class="w-10 h-10 rounded-xl bg-gradient-to-tr from-indigo-500 to-indigo-600 flex items-center justify-center shadow-lg shadow-indigo-500/20 text-white font-bold text-xl">S</div>
                    <div class="text-2xl font-extrabold text-zinc-900 dark:text-white tracking-tight">SofaScraper</div>
                </div>
                <nav class="space-y-1.5 text-[15px] font-medium">
                    <a href="/" class="sidebar-link flex items-center gap-3 rounded-xl px-4 py-3 text-zinc-600 dark:text-zinc-400 hover:bg-zinc-100 dark:hover:bg-zinc-800/80 hover:text-zinc-900 dark:hover:text-white">
                        <svg class="w-5 h-5 flex-shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6"></path></svg>
                        {{ i18n.t('main_menu_title') }}
                    </a>
                    <a href="/leagues" class="sidebar-link flex items-center gap-3 rounded-xl px-4 py-3 text-zinc-600 dark:text-zinc-400 hover:bg-zinc-100 dark:hover:bg-zinc-800/80 hover:text-zinc-900 dark:hover:text-white">
                        <svg class="w-5 h-5 flex-shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 10h16M4 14h16M4 18h16"></path></svg>
                        {{ i18n.t('menu_league_management') }}
                    </a>
                    <a href="/schedule" class="sidebar-link flex items-center gap-3 rounded-xl px-4 py-3 text-zinc-600 dark:text-zinc-400 hover:bg-zinc-100 dark:hover:bg-zinc-800/80 hover:text-zinc-900 dark:hover:text-white">
                        <svg class="w-5 h-5 flex-shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z"></path></svg>
                        {{ i18n.t('menu_match_data') }}
                    </a>
                    <a href="/stats" class="sidebar-link flex items-center gap-3 rounded-xl px-4 py-3 text-zinc-600 dark:text-zinc-400 hover:bg-zinc-100 dark:hover:bg-zinc-800/80 hover:text-zinc-900 dark:hover:text-white">
                        <svg class="w-5 h-5 flex-shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 19v-6a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2a2 2 0 002-2zm0 0V9a2 2 0 012-2h2a2 2 0 012 2v10m-6 0a2 2 0 002 2h2a2 2 0 002-2m0 0V5a2 2 0 012-2h2a2 2 0 012 2v14a2 2 0 01-2 2h-2a2 2 0 01-2-2z"></path></svg>
                        {{ i18n.t('menu_stats') }}
                    </a>
                    <a href="/settings" class="sidebar-link flex items-center gap-3 rounded-xl px-4 py-3 text-zinc-600 dark:text-zinc-400 hover:bg-zinc-100 dark:hover:bg-zinc-800/80 hover:text-zinc-900 dark:hover:text-white">
                        <svg class="w-5 h-5 flex-shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z"></path><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"></path></svg>
                        {{ i18n.t('menu_settings') }}
                    </a>
                </nav>
            </div>
            
            <div class="mt-auto border-t border-zinc-200 dark:border-zinc-800/60 pt-5">
                <button id="theme-toggle" class="relative flex w-full items-center justify-between rounded-xl px-4 py-3 text-sm font-medium hover:bg-zinc-100 dark:hover:bg-zinc-800/80 transition-colors text-zinc-600 dark:text-zinc-400 group">
                    <span class="flex items-center gap-3">
                        <svg class="w-5 h-5 flex-shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M20.354 15.354A9 9 0 018.646 3.646 9.003 9.003 0 0012 21a9.003 9.003 0 008.354-5.646z"></path></svg>
                        Görünüm Seç
                    </span>
                    <span class="relative inline-flex h-6 w-11 items-center rounded-full bg-zinc-200 dark:bg-indigo-500 transition-colors">
                        <span id="theme-toggle-knob" class="inline-block h-4 w-4 transform rounded-full bg-white shadow transition-transform translate-x-1"></span>
                    </span>
                </button>
            </div>
        </aside>
        
        <main class="flex-1 w-full max-w-[1400px] mx-auto p-6 md:p-8 lg:p-10 transition-all duration-300">
            {% block content %}{% endblock %}
        </main>
    </div>

    <!-- Blur decorations -->
    <div class="fixed top-0 inset-x-0 h-40 bg-gradient-to-b from-indigo-50/50 to-transparent dark:from-indigo-900/10 pointer-events-none -z-10"></div>
    <div class="fixed top-[-10%] right-[-5%] w-[500px] h-[500px] bg-indigo-400/20 dark:bg-indigo-600/10 rounded-full blur-[100px] pointer-events-none -z-10"></div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const themeToggleBtn = document.getElementById('theme-toggle');
            const themeKnob = document.getElementById('theme-toggle-knob');
            const toggleBg = themeKnob.parentElement;

            function updateIcons() {
                if (document.documentElement.classList.contains('dark')) {
                    themeKnob.classList.add('translate-x-6');
                    themeKnob.classList.remove('translate-x-1');
                    toggleBg.classList.add('bg-indigo-500');
                    toggleBg.classList.remove('bg-zinc-200');
                } else {
                    themeKnob.classList.remove('translate-x-6');
                    themeKnob.classList.add('translate-x-1');
                    toggleBg.classList.remove('bg-indigo-500');
                    toggleBg.classList.add('bg-zinc-200');
                }
            }

            // Init icons
            updateIcons();

            themeToggleBtn.addEventListener('click', function() {
                if (document.documentElement.classList.contains('dark')) {
                    document.documentElement.classList.remove('dark');
                    localStorage.setItem('theme', 'light');
                } else {
                    document.documentElement.classList.add('dark');
                    localStorage.setItem('theme', 'dark');
                }
                updateIcons();
            });
        });
    </script>

    <!-- Global Task Toast -->
    <div x-data="globalScraperToast" x-init="initToast"
         x-show="state.is_running"
         style="display: none;"
         class="fixed bottom-6 right-6 w-[320px] bg-white/90 dark:bg-zinc-900/90 backdrop-blur-xl border border-zinc-200/50 dark:border-zinc-700/50 shadow-2xl rounded-2xl p-4 z-50 pointer-events-none transform transition-all duration-500 origin-bottom-right"
         x-transition:enter="ease-out duration-300"
         x-transition:enter-start="opacity-0 scale-95 translate-y-4"
         x-transition:enter-end="opacity-100 scale-100 translate-y-0"
         x-transition:leave="ease-in duration-200"
         x-transition:leave-start="opacity-100 scale-100 translate-y-0"
         x-transition:leave-end="opacity-0 scale-95 translate-y-4">
         
        <div class="flex items-center gap-3 mb-3">
            <div class="relative flex h-3 w-3 shrink-0">
                <span class="animate-ping absolute inline-flex h-full w-full rounded-full bg-indigo-400 opacity-75"></span>
                <span class="relative inline-flex rounded-full h-3 w-3 bg-indigo-500"></span>
            </div>
            <div class="flex-1 flex justify-between items-center min-w-0">
                <span class="font-bold text-sm text-zinc-900 dark:text-white truncate">Arka Plan İşlemi...</span>
                <span class="text-xs font-bold text-indigo-600 dark:text-indigo-400 ml-2" x-text="state.progress + '%'"></span>
            </div>
        </div>
        
        <div class="w-full bg-zinc-100 dark:bg-zinc-800 rounded-full h-1.5 mb-2 overflow-hidden shadow-inner">
            <div class="bg-gradient-to-r from-indigo-500 to-indigo-400 h-full rounded-full transition-all duration-300 ease-out" :style="`width: ${state.progress}%`"></div>
        </div>
        
        <div class="text-[11px] text-zinc-500 dark:text-zinc-400 font-mono truncate" x-text="state.current_task || 'Başlatılıyor...'"></div>
    </div>

    <script>
        document.addEventListener('alpine:init', () => {
            Alpine.data('globalScraperToast', () => ({
                state: { is_running: false, progress: 0, current_task: '' },
                async checkStatus() {
                    try {
                        const res = await fetch('/api/scrape/status');
                        if (res.ok) {
                            this.state = await res.json();
                        }
                    } catch (e) {}
                },
                initToast() {
                    this.checkStatus();
                    setInterval(() => this.checkStatus(), 2000);
                }
            }));
        });
    </script>
</body>

</html>
