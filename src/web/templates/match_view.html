{% extends "base.html" %}

{% block title %}{{ i18n.t('match_detail_title') }}: {{ match_id }} - SofaScore Scraper{% endblock %}

{% block content %}
<script>
window.__MATCH_VIEW_I18N__ = {
    stats_card_all_line: {{ i18n.t('stats_card_all_line') | tojson }},
    fetch_error_generic: {{ i18n.t('fetch_error_generic') | tojson }},
    fetch_error_rate_limit: {{ i18n.t('fetch_error_rate_limit') | tojson }},
    fetch_error_not_found: {{ i18n.t('fetch_error_not_found') | tojson }},
    fetching_in_progress: {{ i18n.t('fetching_in_progress') | tojson }},
    fetch_now_button: {{ i18n.t('fetch_now_button') | tojson }},
    refill_missing_button: {{ i18n.t('match_refill_missing_button') | tojson }},
    refill_success: {{ i18n.t('match_refill_success') | tojson }},
    nav_summary: {{ i18n.t('match_nav_summary') | tojson }},
    nav_stats: {{ i18n.t('match_statistics_title') | tojson }},
    nav_lineups: {{ i18n.t('match_section_lineups') | tojson }},
    nav_h2h: {{ i18n.t('match_section_h2h') | tojson }},
    nav_form: {{ i18n.t('match_section_pregame_form') | tojson }},
    nav_streaks: {{ i18n.t('match_section_team_streaks') | tojson }},
    nav_incidents: {{ i18n.t('match_section_incidents') | tojson }},
    nav_jump_hint: {{ i18n.t('match_nav_jump_hint') | tojson }},
    inc_reversed_fmt: {{ i18n.t('match_incident_reversed_fmt') | tojson }},
    inc_sub_off: {{ i18n.t('match_incident_sub_off') | tojson }},
    inc_sub_on: {{ i18n.t('match_incident_sub_on') | tojson }},
    inc_card_yellow: {{ i18n.t('match_incident_card_yellow') | tojson }},
    inc_card_red: {{ i18n.t('match_incident_card_red') | tojson }},
    inc_injury_time: {{ i18n.t('match_incident_injury_time') | tojson }},
    inc_stoppage_fmt: {{ i18n.t('match_incident_stoppage_minutes') | tojson }},
    inc_card_rescinded: {{ i18n.t('match_incident_card_rescinded') | tojson }},
    inc_injured_player: {{ i18n.t('match_incident_injured_player') | tojson }},
    inc_sub_injury: {{ i18n.t('match_incident_sub_injury') | tojson }},
};
window.createMatchViewState = function (matchId) {
    const msg = window.__MATCH_VIEW_I18N__ || {};
    return {
    matchId: String(matchId),
    msg,
    matchData: null,
    loading: true,
    error: null,
    notFetched: false,
    fetching: false,
    fetchError: null,
    fetchSuccess: false,
    coverageNotice: null,
    coverageNoticeType: 'ok',
    statsCategoryFilter: 'all',

    statisticsPeriods(data) {
        const s = data?.statistics;
        if (!s) return [];
        const periods = Array.isArray(s) ? s : (s.statistics || []);
        const all = periods.filter(p => p && p.period === 'ALL');
        if (all.length) return all;
        return periods.length ? [periods[0]] : [];
    },
    statisticsHasData(data) {
        for (const p of this.statisticsPeriods(data)) {
            const groups = p.groups || [];
            for (const g of groups) {
                if ((g.statisticsItems || []).length) return true;
            }
        }
        return false;
    },
    statBarWidth(stat, side) {
        const v = side === 'home' ? stat.homeValue : stat.awayValue;
        if (v == null || Number.isNaN(Number(v))) return 50;
        const n = Number(v);
        if (n >= 0 && n <= 100) return Math.min(100, Math.max(0, n));
        const hn = Number(stat.homeValue);
        const an = Number(stat.awayValue);
        if (!Number.isNaN(hn) && !Number.isNaN(an) && (hn + an) > 0) {
            return side === 'home' ? Math.round((hn / (hn + an)) * 100) : Math.round((an / (hn + an)) * 100);
        }
        return 50;
    },

    statisticsGroupsFlat(data) {
        const out = [];
        let id = 0;
        for (const p of this.statisticsPeriods(data)) {
            for (const g of (p.groups || [])) {
                const items = g.statisticsItems || [];
                if (!items.length) continue;
                out.push({
                    id: id++,
                    title: (g.groupName || g.name || '').trim() || '—',
                    items,
                });
            }
        }
        return out;
    },

    totalStatMetrics(data) {
        if (!data) return 0;
        return this.statisticsGroupsFlat(data).reduce((s, g) => s + (g.items?.length || 0), 0);
    },
    allCardSubtitle() {
        const grps = this.statisticsGroupsFlat(this.matchData);
        const cats = grps.length;
        const rows = this.totalStatMetrics(this.matchData);
        return String(msg.stats_card_all_line || '').replace('{cats}', String(cats)).replace('{rows}', String(rows));
    },
    displayedStatGroups(data) {
        const all = this.statisticsGroupsFlat(data);
        if (this.statsCategoryFilter === 'all') return all;
        return all.filter(g => g.id === this.statsCategoryFilter);
    },
    selectStatCategory(id) {
        this.statsCategoryFilter = id;
        const base = window.location.pathname + window.location.search;
        if (id === 'all') {
            if (window.location.hash) history.replaceState(null, '', base);
        } else {
            history.replaceState(null, '', base + '#stats-' + id);
            queueMicrotask(() => {
                document.getElementById('match-section-statistics')?.scrollIntoView({ behavior: 'smooth', block: 'start' });
            });
        }
    },
    applyStatsHash() {
        const m = (window.location.hash || '').match(/^#stats-([0-9]+)$/);
        if (!m || !this.matchData) return;
        const id = parseInt(m[1], 10);
        if (this.statisticsGroupsFlat(this.matchData).some(g => g.id === id)) {
            this.statsCategoryFilter = id;
        }
    },

    formatKickoff(ts) {
        if (ts == null || ts === '') return '-';
        const n = Number(ts);
        const d = new Date(n > 0 && n < 1e12 ? n * 1000 : n);
        if (isNaN(d.getTime())) return '-';
        return d.toLocaleString(document.documentElement.lang || 'tr-TR', {
            day: 'numeric', month: 'short', year: 'numeric',
            hour: '2-digit', minute: '2-digit', hour12: false
        });
    },
    formatShortDate(ts) {
        if (ts == null || ts === '') return '—';
        const n = Number(ts);
        const d = new Date(n > 0 && n < 1e12 ? n * 1000 : n);
        if (isNaN(d.getTime())) return '—';
        return d.toLocaleDateString(document.documentElement.lang || 'tr-TR', {
            day: 'numeric', month: 'short', year: 'numeric'
        });
    },

    hasLineupsData(d) {
        const L = d?.lineups;
        if (!L || typeof L !== 'object') return false;
        for (const side of ['home', 'away']) {
            const pl = L[side]?.players;
            if (Array.isArray(pl) && pl.length > 0) return true;
        }
        return false;
    },
    lineupSplit(side) {
        const L = this.matchData?.lineups?.[side];
        if (!L?.players || !Array.isArray(L.players)) {
            return { starters: [], subs: [], formation: null, teamName: null };
        }
        const formation = L.formation?.name || L.formation?.shortName || L.formation?.label || null;
        const teamName = L.team?.name || L.team?.shortName || null;
        const starters = L.players.filter((p) => p.substitute !== true);
        const subs = L.players.filter((p) => p.substitute === true);
        return { starters, subs, formation, teamName };
    },
    lineupPlayerLabel(p) {
        const pl = p?.player || p;
        if (!pl) return '?';
        return pl.shortName || pl.name || pl.userName || pl.slug || String(pl.id ?? '?');
    },
    lineupShirt(p) {
        const n = p.shirtNumber ?? p.jerseyNumber ?? p.player?.shirtNumber;
        return n != null && n !== '' ? String(n) : '';
    },

    hasH2hData(d) {
        const h = d?.h2h;
        if (!h || typeof h !== 'object') return false;
        const td = h.teamDuel;
        if (td && (td.homeWins != null || td.awayWins != null || td.draws != null)) return true;
        const raw = h.matches || h.events || td?.matches;
        return Array.isArray(raw) && raw.length > 0;
    },
    h2hDuel(d) {
        return d?.h2h?.teamDuel || null;
    },
    h2hRecentMatches(d) {
        const h = d?.h2h;
        if (!h) return [];
        const raw = h.matches || h.events || h.teamDuel?.matches || [];
        if (!Array.isArray(raw)) return [];
        return raw.slice(0, 12).map((ev) => {
            const home = ev.homeTeam?.shortName || ev.homeTeam?.name || '?';
            const away = ev.awayTeam?.shortName || ev.awayTeam?.name || '?';
            const hs = ev.homeScore?.current ?? ev.homeScore?.display ?? ev.homeScore;
            const aws = ev.awayScore?.current ?? ev.awayScore?.display ?? ev.awayScore;
            const ts = ev.startTimestamp ?? ev.time?.timestamp;
            return { home, away, hs, aws, ts };
        });
    },

    hasPregameFormData(d) {
        const p = d?.pregame_form;
        if (!p || typeof p !== 'object') return false;
        const chk = (t) => t && typeof t === 'object' && (
            (Array.isArray(t.form) && t.form.length > 0) ||
            t.position != null || t.value != null || t.avgRating != null
        );
        return chk(p.homeTeam) || chk(p.awayTeam);
    },
    formLetters(team) {
        if (!team?.form || !Array.isArray(team.form)) return '—';
        return team.form.slice(-10).join(' ');
    },

    hasTeamStreaksData(d) {
        const g = d?.team_streaks?.general;
        return Array.isArray(g) && g.length > 0;
    },

    hasIncidentsData(d) {
        let raw = d?.incidents;
        if (raw && typeof raw === 'object' && !Array.isArray(raw) && Array.isArray(raw.incidents)) {
            raw = raw.incidents;
        }
        return Array.isArray(raw) && raw.length > 0;
    },
    incidentsList(d) {
        let raw = d?.incidents;
        if (raw && typeof raw === 'object' && !Array.isArray(raw) && Array.isArray(raw.incidents)) {
            raw = raw.incidents;
        }
        return Array.isArray(raw) ? raw : [];
    },
    incidentPersonName(obj) {
        if (obj == null) return '';
        if (typeof obj === 'string') return obj;
        const p = obj.player || obj;
        return (p && (p.name || p.shortName)) || obj.name || obj.shortName || '';
    },
    formatIncidentMinute(inc) {
        if (inc == null) return '';
        if (inc.text && (inc.time == null || inc.time < 0)) return '';
        const t = inc.time;
        const r = inc.reversedPeriodTime;
        const typLower = String(inc.incidentType || inc.type || '').toLowerCase();
        const showReversedDetail = typLower === 'period' || typLower === 'injurytime';
        if ((t == null || t < 0) && t !== 0) return '';
        if (r == null || r === t) return String(t) + '′';
        if ((t === 45 || t === 90) && r >= 1 && r <= 15)
            return String(t) + '+' + String(r) + '′';
        if (!showReversedDetail) return String(t) + '′';
        const L = window.__MATCH_VIEW_I18N__ || {};
        const fmt = L.inc_reversed_fmt || '{main}′ · period {rev}′';
        return fmt.replace('{main}', String(t)).replace('{rev}', String(r));
    },
    formatIncidentRow(inc) {
        if (!inc) return '';
        const parts = [];
        const typRaw = inc.incidentType || inc.type || inc.incidentClass || '';
        const typ = String(typRaw || '');
        const typLower = typ.toLowerCase();

        if (inc.text && (inc.time == null || inc.time < 0)) {
            parts.push(String(inc.text));
        }
        const minStr = this.formatIncidentMinute(inc);
        if (minStr) parts.push(minStr);

        if (typLower === 'substitution') {
            if (typ) parts.push(typ);
            const L = window.__MATCH_VIEW_I18N__ || {};
            const offL = L.inc_sub_off || 'Off';
            const onL = L.inc_sub_on || 'On';
            const outN = this.incidentPersonName(inc.playerOut) || this.incidentPersonName(inc.player);
            const inN = this.incidentPersonName(inc.playerIn) || this.incidentPersonName(inc.assist1);
            if (outN) parts.push(offL + ': ' + outN);
            if (inN) parts.push(onL + ': ' + inN);
            if (this.incidentIsInjurySubstitution(inc) && outN)
                parts.push((L.inc_injured_player || 'Injured') + ': ' + outN);
        } else if (typLower === 'period') {
            if (inc.text) parts.push(String(inc.text));
            else if (typ) parts.push(typ);
        } else if (typLower === 'injurytime') {
            if (typ) parts.push(typ);
            if (inc.length != null) parts.push('+' + String(inc.length) + '′');
        } else {
            if (typ) parts.push(typ);
            const pn = this.incidentPersonName(inc.player);
            if (pn) parts.push(pn);
            const an = this.incidentPersonName(inc.assist1);
            if (an) parts.push('(' + an + ')');
            if (typLower === 'card' && inc.reason) parts.push(String(inc.reason));
        }

        if (inc.isHome === true) parts.push('●');
        else if (inc.isHome === false) parts.push('○');
        if (inc.homeScore != null && inc.awayScore != null) {
            parts.push(inc.homeScore + '–' + inc.awayScore);
        }
        return parts.length ? parts.join(' · ') : '—';
    },

    incidentPrettifyType(raw) {
        const s = String(raw || '')
            .replace(/([a-z])([A-Z])/g, '$1 $2')
            .replace(/_/g, ' ')
            .toLowerCase();
        if (!s) return '';
        return s.replace(/^\w/, (c) => c.toUpperCase());
    },
    incidentIsInjurySubstitution(inc) {
        if (!inc) return false;
        const t = String(inc.incidentType || inc.type || '').toLowerCase();
        if (t !== 'substitution') return false;
        return inc.injury === true || String(inc.incidentClass || '').toLowerCase() === 'injury';
    },
    /** SofaScore: yellow | red | yellowRed (ikinci sarı → kırmızı). */
    incidentCardClass(inc) {
        if (!inc) return '';
        return String(inc.incidentClass ?? inc.incident_class ?? '')
            .trim()
            .toLowerCase();
    },
    incidentStyleKind(inc) {
        const t = String(inc.incidentType || inc.type || '').toLowerCase();
        if (t === 'goal' || t === 'owngoal' || t === 'penalty' || t === 'freekick') return 'goal';
        if (t === 'card') {
            const cc = this.incidentCardClass(inc);
            if (cc === 'red' || cc === 'yellowred') return 'cardRed';
            if (cc === 'yellow') return 'cardYellow';
            return 'card';
        }
        if (t === 'substitution') {
            if (this.incidentIsInjurySubstitution(inc)) return 'subInjury';
            return 'sub';
        }
        if (t.includes('var')) return 'var';
        if (t === 'period') return 'period';
        if (t === 'injurytime') return 'injury';
        return 'other';
    },
    incidentTypePillClass(inc) {
        const k = this.incidentStyleKind(inc);
        const map = {
            goal: 'bg-emerald-500/15 text-emerald-800 dark:text-emerald-200 ring-1 ring-emerald-500/25',
            card: 'bg-amber-500/15 text-amber-900 dark:text-amber-200 ring-1 ring-amber-500/25',
            cardYellow: 'bg-amber-400/30 text-amber-950 dark:text-amber-100 ring-1 ring-amber-500/45',
            cardRed: 'bg-red-500/25 text-red-950 dark:text-red-100 ring-1 ring-red-500/45',
            sub: 'bg-sky-500/15 text-sky-900 dark:text-sky-200 ring-1 ring-sky-500/25',
            subInjury: 'bg-orange-500/14 text-orange-950 dark:text-orange-100 ring-1 ring-orange-400/35',
            var: 'bg-violet-500/15 text-violet-900 dark:text-violet-200 ring-1 ring-violet-500/25',
            period: 'bg-zinc-500/15 text-zinc-800 dark:text-zinc-200 ring-1 ring-zinc-500/20',
            injury: 'bg-orange-500/12 text-orange-900 dark:text-orange-200 ring-1 ring-orange-500/20',
            other: 'bg-zinc-500/10 text-zinc-700 dark:text-zinc-300 ring-1 ring-zinc-500/15',
        };
        return map[k] || map.other;
    },
    incidentStructured(inc) {
        if (!inc) {
            return {
                minute: '',
                onlyText: false,
                banner: '',
                typeKey: '',
                typeLabel: '',
                primary: '',
                secondary: '',
                cardReason: '',
                injuredPlayer: '',
                extra: [],
                score: '',
                side: 'neutral',
            };
        }
        const typKey = inc.incidentType || inc.type || '';
        const typLower = String(typKey || '').toLowerCase();
        const min = this.formatIncidentMinute(inc);
        const L = window.__MATCH_VIEW_I18N__ || {};
        const offL = L.inc_sub_off || 'Off';
        const onL = L.inc_sub_on || 'On';
        const onlyText = !!(inc.text && (inc.time == null || inc.time < 0));
        const score =
            inc.homeScore != null && inc.awayScore != null ? inc.homeScore + '–' + inc.awayScore : '';
        const side = inc.isHome === true ? 'home' : inc.isHome === false ? 'away' : 'neutral';

        let banner = '';
        let primary = '';
        let secondary = '';
        let cardReason = '';
        let injuredPlayer = '';
        const extra = [];

        if (onlyText) {
            banner = String(inc.text);
        } else if (typLower === 'substitution') {
            const outN = this.incidentPersonName(inc.playerOut) || this.incidentPersonName(inc.player);
            const inN = this.incidentPersonName(inc.playerIn) || this.incidentPersonName(inc.assist1);
            if (outN) extra.push({ k: offL, v: outN });
            if (inN) extra.push({ k: onL, v: inN });
            if (this.incidentIsInjurySubstitution(inc) && outN) injuredPlayer = outN;
        } else if (typLower === 'period') {
            if (inc.text) banner = String(inc.text);
        } else if (typLower === 'injurytime') {
            const n = inc.length;
            if (n != null && n !== '') {
                const fmt = L.inc_stoppage_fmt || '+{n}′';
                banner = String(fmt).replace(/\{n\}/g, String(n));
            }
        } else if (typLower === 'card') {
            primary = this.incidentPersonName(inc.player) || (inc.playerName ? String(inc.playerName) : '');
            if (inc.reason) {
                cardReason = String(inc.reason);
                if (inc.rescinded === true) cardReason += ' — ' + (L.inc_card_rescinded || '');
            }
        } else {
            primary = this.incidentPersonName(inc.player);
            const an = this.incidentPersonName(inc.assist1);
            if (an) secondary = an;
        }

        let typeLabel = this.incidentPrettifyType(typKey);
        if (typLower === 'card') {
            const cc = this.incidentCardClass(inc);
            if (cc === 'yellow') typeLabel = L.inc_card_yellow || typeLabel;
            else if (cc === 'red' || cc === 'yellowred') typeLabel = L.inc_card_red || typeLabel;
        } else if (typLower === 'injurytime') {
            typeLabel = L.inc_injury_time || typeLabel;
        } else if (typLower === 'substitution' && this.incidentIsInjurySubstitution(inc)) {
            typeLabel = L.inc_sub_injury || typeLabel;
        }

        return {
            minute: min,
            onlyText,
            banner,
            typeKey: typLower,
            typeLabel,
            primary,
            secondary,
            cardReason,
            injuredPlayer,
            extra,
            score,
            side,
        };
    },
    incidentsCount(d) {
        return this.incidentsList(d).length;
    },

    matchDetailSlicePresent(key) {
        const d = this.matchData;
        if (!d) return false;
        if (key === 'basic') return !!d.basic;
        if (key === 'statistics') return this.statisticsHasData(d);
        if (key === 'lineups') return this.hasLineupsData(d);
        if (key === 'h2h') return this.hasH2hData(d);
        if (key === 'team_streaks') return this.hasTeamStreaksData(d);
        if (key === 'pregame_form') return this.hasPregameFormData(d);
        if (key === 'incidents') return this.hasIncidentsData(d);
        return !!d[key];
    },

    matchPageNavItems() {
        const L = window.__MATCH_VIEW_I18N__ || {};
        const d = this.matchData;
        if (!d) return [];
        const items = [{ id: 'match-section-hero', label: L.nav_summary }];
        if (this.hasLineupsData(d)) items.push({ id: 'match-section-lineups', label: L.nav_lineups });
        items.push({ id: 'match-section-statistics', label: L.nav_stats });
        if (this.hasH2hData(d)) items.push({ id: 'match-section-h2h', label: L.nav_h2h });
        if (this.hasPregameFormData(d)) items.push({ id: 'match-section-form', label: L.nav_form });
        if (this.hasTeamStreaksData(d)) items.push({ id: 'match-section-streaks', label: L.nav_streaks });
        if (this.hasIncidentsData(d)) items.push({ id: 'match-section-incidents', label: L.nav_incidents });
        return items;
    },

    anyMissingDetailSlices() {
        const keys = ['statistics', 'lineups', 'h2h', 'team_streaks', 'pregame_form', 'incidents'];
        return keys.some((k) => !this.matchDetailSlicePresent(k));
    },

    scrollToMatchSection(id) {
        document.getElementById(id)?.scrollIntoView({ behavior: 'smooth', block: 'start' });
    },

    async refillMissingSlices() {
        this.fetching = true;
        this.fetchError = null;
        this.coverageNotice = null;
        try {
            const res = await fetch(`/api/matches/${this.matchId}/fetch`, { method: 'POST' });
            if (res.status === 429) {
                this.coverageNotice = msg.fetch_error_rate_limit;
                this.coverageNoticeType = 'err';
                return;
            }
            if (res.status === 404) {
                this.coverageNotice = msg.fetch_error_not_found;
                this.coverageNoticeType = 'err';
                return;
            }
            if (!res.ok) {
                const err = await res.json();
                this.coverageNotice = err.detail || msg.fetch_error_generic;
                this.coverageNoticeType = 'err';
                return;
            }
            this.coverageNotice = msg.refill_success;
            this.coverageNoticeType = 'ok';
            await this.fetchDetails();
        } catch (e) {
            this.coverageNotice = msg.fetch_error_generic;
            this.coverageNoticeType = 'err';
        } finally {
            this.fetching = false;
        }
    },

    async fetchDetails() {
        this.loading = true;
        this.error = null;
        this.notFetched = false;
        try {
            const res = await fetch(`/api/matches/${this.matchId}`);
            if (res.status === 404) {
                this.notFetched = true;
                return;
            }
            if (!res.ok) throw new Error(msg.fetch_error_generic || 'Error');
            const data = await res.json();
            if (!data || (Object.keys(data).length === 0)) {
                this.notFetched = true;
                return;
            }
            this.matchData = data;
            this.statsCategoryFilter = 'all';
            queueMicrotask(() => this.applyStatsHash());
        } catch(e) {
            this.error = e.message;
        } finally {
            this.loading = false;
        }
    },
    async triggerFetch() {
        this.fetching = true;
        this.fetchError = null;
        this.fetchSuccess = false;
        try {
            const res = await fetch(`/api/matches/${this.matchId}/fetch`, { method: 'POST' });
            if (res.status === 429) {
                this.fetchError = msg.fetch_error_rate_limit;
                return;
            }
            if (res.status === 404) {
                this.fetchError = msg.fetch_error_not_found;
                return;
            }
            if (!res.ok) {
                const err = await res.json();
                this.fetchError = err.detail || msg.fetch_error_generic;
                return;
            }
            this.fetchSuccess = true;
            this.notFetched = false;
            await this.fetchDetails();
        } catch(e) {
            this.fetchError = msg.fetch_error_generic;
        } finally {
            this.fetching = false;
        }
    }
    };
};
</script>

                                    <ul class="divide-y divide-zinc-100 dark:divide-zinc-800 border border-zinc-200 dark:border-zinc-700 rounded-xl overflow-hidden">
                                        <template x-for="(row, ri) in h2hRecentMatches(matchData)" :key="'h2h-m-' + ri">
                                            <li class="flex flex-wrap items-center justify-between gap-2 px-4 py-2.5 text-sm bg-white dark:bg-zinc-900/30">
                                                <span class="text-zinc-600 dark:text-zinc-400 tabular-nums text-xs w-24 shrink-0" x-text="formatShortDate(row.ts)"></span>
                                                <span class="flex-1 min-w-0 text-center">
                                                    <span class="font-medium text-zinc-800 dark:text-zinc-200" x-text="row.home"></span>
                                                    <span class="mx-2 text-zinc-400">—</span>
                                                    <span class="font-medium text-zinc-800 dark:text-zinc-200" x-text="row.away"></span>
                                                </span>
                                                <span class="font-bold tabular-nums text-zinc-900 dark:text-white shrink-0" x-text="(row.hs ?? '?') + ' : ' + (row.aws ?? '?')"></span>
                                            </li>
                                        </template>
                                    </ul>
                                </div>
                            </template>
                        </div>
                        </section>
                    </template>

                    <!-- Pregame form -->
                    <template x-if="hasPregameFormData(matchData)">
                        <section id="match-section-form" class="scroll-mt-28 md:scroll-mt-36">
                        <div class="bg-white dark:bg-zinc-800/80 backdrop-blur-md border border-zinc-200 dark:border-zinc-700/50 shadow-sm p-6 sm:p-7 rounded-2xl">
                            <h3 class="text-lg font-bold text-zinc-900 dark:text-white mb-4">{{ i18n.t('match_section_pregame_form') }}</h3>
                            <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                                <template x-for="side in ['homeTeam', 'awayTeam']" :key="'form-' + side">
                                    <div class="rounded-xl border border-zinc-200 dark:border-zinc-700/80 p-4 bg-zinc-50/40 dark:bg-zinc-900/30">
                                        <div class="font-bold text-zinc-900 dark:text-white mb-3"
                                            x-text="side === 'homeTeam' ? (matchData.basic.homeTeam?.shortName || matchData.basic.homeTeam?.name) : (matchData.basic.awayTeam?.shortName || matchData.basic.awayTeam?.name)"></div>
                                        <div class="space-y-2 text-sm">
                                            <div class="flex justify-between gap-4" x-show="matchData.pregame_form[side]?.position != null">
                                                <span class="text-zinc-500">{{ i18n.t('match_form_position') }}</span>
                                                <span class="font-medium text-zinc-900 dark:text-white tabular-nums" x-text="matchData.pregame_form[side]?.position ?? '—'"></span>
                                            </div>
                                            <div class="flex justify-between gap-4" x-show="matchData.pregame_form[side]?.value != null">
                                                <span class="text-zinc-500">{{ i18n.t('match_form_points') }}</span>
                                                <span class="font-medium text-zinc-900 dark:text-white tabular-nums" x-text="matchData.pregame_form[side]?.value ?? '—'"></span>
                                            </div>
                                            <div class="flex justify-between gap-4" x-show="matchData.pregame_form[side]?.avgRating != null">
                                                <span class="text-zinc-500">{{ i18n.t('match_form_rating') }}</span>
                                                <span class="font-medium text-zinc-900 dark:text-white tabular-nums" x-text="matchData.pregame_form[side]?.avgRating ?? '—'"></span>
                                            </div>
                                            <div class="pt-2 border-t border-zinc-200 dark:border-zinc-700">
                                                <div class="text-[10px] font-bold uppercase tracking-widest text-zinc-400 mb-1">{{ i18n.t('match_form_sequence') }}</div>
                                                <div class="font-mono text-xs tracking-wider text-zinc-800 dark:text-zinc-200 break-all" x-text="formLetters(matchData.pregame_form[side])"></div>
                                            </div>
                                        </div>
                                    </div>
                                </template>
                            </div>
                        </div>
                        </section>
                    </template>

                    <!-- Team streaks -->
                    <template x-if="hasTeamStreaksData(matchData)">
                        <section id="match-section-streaks" class="scroll-mt-28 md:scroll-mt-36">
                        <div class="bg-white dark:bg-zinc-800/80 backdrop-blur-md border border-zinc-200 dark:border-zinc-700/50 shadow-sm p-6 sm:p-7 rounded-2xl">
                            <h3 class="text-lg font-bold text-zinc-900 dark:text-white mb-4">{{ i18n.t('match_section_team_streaks') }}</h3>
                            <ul class="space-y-2">
                                <template x-for="(st, si) in matchData.team_streaks.general" :key="'streak-' + si">
                                    <li class="flex flex-wrap items-center justify-between gap-2 py-2 px-3 rounded-lg bg-zinc-50 dark:bg-zinc-900/40 border border-zinc-100 dark:border-zinc-800 text-sm">
                                        <span class="text-xs font-semibold uppercase px-2 py-0.5 rounded-md shrink-0"
                                            :class="st.team === 'home' ? 'bg-indigo-100 text-indigo-800 dark:bg-indigo-500/20 dark:text-indigo-300' : 'bg-red-100 text-red-800 dark:bg-red-500/20 dark:text-red-300'"
                                            x-text="st.team === 'home' ? '{{ i18n.t('match_streak_team_home') }}' : '{{ i18n.t('match_streak_team_away') }}'"></span>
                                        <span class="text-zinc-700 dark:text-zinc-300 flex-1" x-text="st.name"></span>
                                        <span class="font-bold text-zinc-900 dark:text-white tabular-nums" x-text="st.value"></span>
                                    </li>
                                </template>
                            </ul>
                        </div>
                        </section>
                    </template>

                    <!-- Incidents / events -->
                    <template x-if="hasIncidentsData(matchData)">
                        <section id="match-section-incidents" class="scroll-mt-28 md:scroll-mt-36">
                        <div class="bg-white dark:bg-zinc-800/80 backdrop-blur-md border border-zinc-200 dark:border-zinc-700/50 shadow-sm p-6 sm:p-7 rounded-2xl">
                            <h3 class="text-lg font-bold text-zinc-900 dark:text-white mb-1">{{ i18n.t('match_section_incidents') }}</h3>
                            <p class="text-xs text-zinc-500 dark:text-zinc-400 mb-5">{{ i18n.t('match_incidents_timeline_hint') }}</p>
                            <div class="max-h-[26rem] overflow-y-auto overflow-x-hidden rounded-2xl border border-zinc-200/90 dark:border-zinc-700/80 bg-zinc-50/40 dark:bg-zinc-900/35 p-2 sm:p-4">
                                <ul class="list-none space-y-0" role="list">
                                <template x-for="(inc, ii) in incidentsList(matchData)" :key="'inc-' + ii">
                                    <li class="flex gap-2 sm:gap-4">
                                        <div class="flex flex-col items-center shrink-0 w-[3rem] sm:w-[4.25rem] pt-0.5" aria-hidden="true">
                                            <span class="inline-flex items-center justify-center min-w-[2.5rem] px-1.5 py-1 rounded-lg text-[10px] sm:text-xs font-extrabold tabular-nums tracking-tight text-zinc-900 dark:text-zinc-50 bg-white dark:bg-zinc-800 shadow-sm ring-1 ring-zinc-200/90 dark:ring-zinc-600/80"
                                                x-text="incidentStructured(inc).minute || '—'"></span>
                                            <span class="w-px flex-1 min-h-[10px] mt-2 mb-1 rounded-full bg-gradient-to-b from-zinc-300 dark:from-zinc-600 to-transparent opacity-90"
                                                x-show="ii < incidentsCount(matchData) - 1"></span>
                                        </div>
                                        <div class="flex-1 min-w-0"
                                            :class="ii < incidentsCount(matchData) - 1 ? 'pb-4 sm:pb-5' : 'pb-0'">
                                            <div class="relative rounded-xl border overflow-hidden shadow-sm"
                                                :aria-label="formatIncidentRow(inc)"
                                                :class="{
                                                    'border-l-[3px] border-l-indigo-500 border-indigo-200/70 dark:border-indigo-500/40 bg-gradient-to-br from-indigo-50/90 to-white dark:from-indigo-950/35 dark:to-zinc-900/50': incidentStructured(inc).side === 'home',
                                                    'border-l-[3px] border-l-red-500 border-red-200/70 dark:border-red-500/40 bg-gradient-to-br from-red-50/90 to-white dark:from-red-950/30 dark:to-zinc-900/50': incidentStructured(inc).side === 'away',
                                                    'border-l-[3px] border-l-zinc-300 dark:border-l-zinc-600 border-zinc-200 dark:border-zinc-700 bg-white/90 dark:bg-zinc-900/55': incidentStructured(inc).side === 'neutral',
                                                }">
                                                <div class="px-3 py-3 sm:px-4 sm:py-3.5">
                                                    <div class="flex flex-wrap items-start gap-x-2 gap-y-1.5 mb-1">
                                                        <span class="text-[10px] sm:text-[11px] font-bold uppercase tracking-wide px-2 py-0.5 rounded-md max-w-[85%]"
                                                            x-show="incidentStructured(inc).typeLabel"
                                                            :class="incidentTypePillClass(inc)"
                                                            x-text="incidentStructured(inc).typeLabel"></span>
                                                        <span class="ml-auto text-xs sm:text-sm font-bold tabular-nums text-zinc-700 dark:text-zinc-200 shrink-0"
                                                            x-show="incidentStructured(inc).score"
                                                            x-text="incidentStructured(inc).score"></span>
                                                    </div>
                                                    <p class="text-xs font-semibold text-orange-800 dark:text-orange-200/95 mt-0.5 mb-1"
                                                        x-show="!incidentStructured(inc).onlyText && incidentStructured(inc).injuredPlayer"
                                                        x-text="msg.inc_injured_player + ': ' + incidentStructured(inc).injuredPlayer"></p>
                                                    <template x-if="incidentStructured(inc).onlyText">
                                                        <p class="text-sm font-semibold text-zinc-900 dark:text-white leading-snug" x-text="incidentStructured(inc).banner"></p>
                                                    </template>
                                                    <div x-show="!incidentStructured(inc).onlyText" class="space-y-1">
                                                        <p class="text-base font-bold text-zinc-900 dark:text-white leading-tight tracking-tight"
                                                            x-show="incidentStructured(inc).banner"
                                                            x-text="incidentStructured(inc).banner"></p>
                                                        <p class="text-sm font-semibold text-zinc-900 dark:text-zinc-100"
                                                            x-show="incidentStructured(inc).primary"
                                                            x-text="incidentStructured(inc).primary"></p>
                                                        <p class="text-xs text-zinc-600 dark:text-zinc-400 leading-snug mt-0.5"
                                                            x-show="incidentStructured(inc).cardReason"
                                                            x-text="incidentStructured(inc).cardReason"></p>
                                                        <p class="text-xs text-zinc-600 dark:text-zinc-400"
                                                            x-show="incidentStructured(inc).secondary"
                                                            x-text="'(' + incidentStructured(inc).secondary + ')'"></p>
                                                        <div class="space-y-1.5 pt-0.5" x-show="(incidentStructured(inc).extra || []).length">
                                                            <template x-for="row in incidentStructured(inc).extra" :key="row.k + '-' + row.v">
                                                                <div class="flex gap-2 text-sm items-baseline">
                                                                    <span class="text-[10px] font-bold uppercase tracking-wide text-zinc-500 dark:text-zinc-400 shrink-0 w-11 sm:w-14"
                                                                        x-text="row.k"></span>
                                                                    <span class="font-medium text-zinc-800 dark:text-zinc-200 leading-snug" x-text="row.v"></span>
                                                                </div>
                                                            </template>
                                                        </div>
                                                    </div>
                                                </div>
                                            </div>
                                        </div>
                                    </li>
                                </template>
                                </ul>
                            </div>
                        </div>
                        </section>
                    </template>
                </div>

                <!-- Info Sidebar -->
                <aside class="space-y-6 lg:space-y-8 lg:col-span-4 lg:sticky lg:top-24 lg:self-start">
                    <div class="bg-white dark:bg-zinc-800/80 backdrop-blur-md border border-zinc-200 dark:border-zinc-700/50 shadow-sm p-6 sm:p-7 rounded-2xl">
                        <h3 class="text-base sm:text-lg font-bold text-zinc-900 dark:text-white mb-5">{{ i18n.t('match_sidebar_venue_title') }}</h3>
                        <dl class="space-y-4 text-sm">
                            <div class="flex justify-between gap-4 items-baseline">
                                <dt class="text-zinc-500 dark:text-zinc-400 shrink-0">{{ i18n.t('match_sidebar_date_label') }}</dt>
                                <dd class="text-zinc-900 dark:text-white text-right font-medium tabular-nums"
                                    x-text="formatKickoff(matchData.basic.startTimestamp)"></dd>
                            </div>
                            <div class="flex justify-between gap-4 items-baseline" x-show="matchData.basic.season?.name">
                                <dt class="text-zinc-500 dark:text-zinc-400 shrink-0">{{ i18n.t('match_sidebar_season_label') }}</dt>
                                <dd class="text-zinc-900 dark:text-white text-right font-medium" x-text="matchData.basic.season?.name || '—'"></dd>
                            </div>
                            <div class="flex justify-between gap-4 items-baseline" x-show="matchData.basic.venue">
                                <dt class="text-zinc-500 dark:text-zinc-400 shrink-0">{{ i18n.t('match_sidebar_stadium_label') }}</dt>
                                <dd class="text-zinc-900 dark:text-white text-right font-medium min-w-0" x-text="matchData.basic.venue?.stadium?.name || matchData.basic.venue?.name || '-'"></dd>
                            </div>
                            <div class="flex justify-between gap-4 items-baseline" x-show="matchData.basic.referee">
                                <dt class="text-zinc-500 dark:text-zinc-400 shrink-0">{{ i18n.t('match_sidebar_referee_label') }}</dt>
                                <dd class="text-zinc-900 dark:text-white text-right font-medium min-w-0" x-text="matchData.basic.referee?.name || '-'"></dd>
                            </div>
                            <div class="flex justify-between gap-4 items-baseline" x-show="matchData.basic.roundInfo">
                                <dt class="text-zinc-500 dark:text-zinc-400 shrink-0">{{ i18n.t('match_sidebar_round_label') }}</dt>
                                <dd class="text-zinc-900 dark:text-white text-right font-medium tabular-nums" x-text="matchData.basic.roundInfo?.round ?? matchData.basic.roundInfo?.name ?? '-'"></dd>
                            </div>
                        </dl>
                    </div>

                    <div class="bg-white dark:bg-zinc-800/80 backdrop-blur-md border border-zinc-200 dark:border-zinc-700/50 shadow-sm p-6 sm:p-7 rounded-2xl">
                        <h3 class="text-base sm:text-lg font-bold text-zinc-900 dark:text-white mb-4">{{ i18n.t('match_sidebar_data_coverage') }}</h3>
                        <div class="space-y-2.5 text-sm">
                            <template x-for="key in ['basic', 'statistics', 'lineups', 'h2h', 'team_streaks', 'pregame_form', 'incidents']" :key="key">
                                <div class="flex items-center justify-between gap-3 py-1">
                                    <span class="text-zinc-500 dark:text-zinc-400 capitalize" x-text="key.replace('_', ' ')"></span>
                                    <span class="tabular-nums text-lg leading-none shrink-0" :class="matchDetailSlicePresent(key) ? 'text-emerald-500 dark:text-emerald-400' : 'text-zinc-300 dark:text-zinc-600'"
                                        x-text="matchDetailSlicePresent(key) ? '&#10003;' : '&#10007;'"></span>
                                </div>
                            </template>
                        </div>
                        <div class="mt-5 pt-4 border-t border-zinc-200 dark:border-zinc-700/80" x-show="anyMissingDetailSlices()">
                            <p class="text-xs text-zinc-500 dark:text-zinc-400 mb-3">{{ i18n.t('match_refill_missing_hint') }}</p>
                            <button type="button" @click="refillMissingSlices()" :disabled="fetching"
                                class="w-full inline-flex items-center justify-center gap-2 px-4 py-2.5 rounded-xl text-sm font-semibold bg-indigo-600 hover:bg-indigo-500 text-white shadow-sm disabled:opacity-50 disabled:cursor-not-allowed transition-colors">
                                <template x-if="!fetching">
                                    <svg class="w-4 h-4 shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"></path></svg>
                                </template>
                                <template x-if="fetching">
                                    <svg class="animate-spin w-4 h-4 shrink-0" fill="none" viewBox="0 0 24 24"><circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle><path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path></svg>
                                </template>
                                <span x-text="fetching ? msg.fetching_in_progress : msg.refill_missing_button"></span>
                            </button>
                            <div x-show="coverageNotice" x-transition class="mt-3 text-xs rounded-lg px-3 py-2"
                                :class="coverageNoticeType === 'ok' ? 'bg-emerald-50 dark:bg-emerald-500/10 text-emerald-700 dark:text-emerald-400' : 'bg-red-50 dark:bg-red-500/10 text-red-600 dark:text-red-400'">
                                <span x-text="coverageNotice"></span>
                            </div>
                        </div>
                    </div>
                </aside>
            </div>
        </div>
    </template>
</div>
{% endblock %}
